<!DOCTYPE html><html><head>
<link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' rel='stylesheet'>
<style>
.ticket-card{height:100%}
.ticket-meta{font-size:.9rem;color:#6c757d}
.ticket-title{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ticket-description{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
</style>
</head><body>
<header class='bg-primary text-white py-3 mb-4'>
<div class='container text-center'><h1 class='h3 mb-0'>Help Desk Management System</h1></div>
</header>
<main class='container'>
<h2>Track My Tickets</h2>
<a href='/' class='btn btn-secondary mb-3'>Back to Dashboard</a>
<p>Logged in as <strong th:text='${username}'></strong></p>
<div class='row mb-3'>
<div class='col-md-4 mb-2'>
<div class='border rounded p-3'>
<div class='text-muted'>Total Tickets</div>
<div class='fs-4 fw-bold' th:text='${myTicketMetrics.total}'>0</div>
</div>
</div>
<div class='col-md-4 mb-2'>
<div class='border rounded p-3'>
<div class='text-muted'>Open</div>
<div class='fs-4 fw-bold' th:text='${myTicketMetrics.open}'>0</div>
</div>
</div>
<div class='col-md-4 mb-2'>
<div class='border rounded p-3'>
<div class='text-muted'>Resolved</div>
<div class='fs-4 fw-bold' th:text='${myTicketMetrics.resolved}'>0</div>
</div>
</div>
</div>
<form th:action='@{/track}' method='get' class='row g-2 mb-3'>
<div class='col-md-8'>
<input name='q' class='form-control' placeholder='Search my tickets' th:value='${q}'>
</div>
<div class='col-md-4'>
<button class='btn btn-primary'>Search</button>
<a href='/track' class='btn btn-outline-secondary'>Clear</a>
</div>
</form>
<div class='row row-cols-1 row-cols-md-2 row-cols-xl-3 g-3' th:if='${!#lists.isEmpty(tickets)}'>
<div class='col' th:each='t:${tickets}'>
<div class='card shadow-sm ticket-card'>
<div class='card-body d-flex flex-column'>
<div class='d-flex justify-content-between align-items-start gap-2 mb-2'>
<div>
<div class='ticket-meta'>Ticket #<span th:text='${t.id}'></span></div>
<h3 class='h5 mb-0 ticket-title'><a th:href='@{/tickets/{id}(id=${t.id})}' th:text='${t.title}'></a></h3>
</div>
<span class='badge text-bg-primary' th:text='${t.status}'></span>
</div>
<p class='card-text ticket-description mb-3' th:text='${t.description}'></p>
<div class='ticket-meta mb-1'>Created by <span class='text-dark' th:text='${t.createdBy}'></span></div>
<div class='ticket-meta mb-3'>Assigned to <span class='text-dark' th:text="${t.assignedTo == null ? 'Unassigned' : t.assignedTo}"></span></div>
<div class='small mb-3'>
<span class='text-muted'>Attachment:</span>
<a th:if='${t.attachmentName != null}' th:href='@{/tickets/{id}/attachment(id=${t.id})}' th:text='${t.attachmentName}'></a>
<span th:if='${t.attachmentName == null}'>None</span>
</div>
<div class='mt-auto'>
<a th:href='@{/tickets/{id}(id=${t.id})}' class='btn btn-sm btn-info'>Comments</a>
</div>
</div>
</div>
</div>
</div>
<p th:if='${#lists.isEmpty(tickets)}' class='text-muted'>No tickets to track.</p>
</main></body></html>
