<!DOCTYPE html><html><head>
<link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' rel='stylesheet'>
</head><body>
<header class='bg-primary text-white py-3 mb-4'>
<div class='container text-center'><h1 class='h3 mb-0'>Help Desk Management System</h1></div>
</header>
<main class='container'>
<h2>Edit Ticket</h2>
<form th:action='@{/tickets/{id}/edit(id=${ticket.id})}' method='post'>
<input type='hidden' th:name='${_csrf.parameterName}' th:value='${_csrf.token}'>
<label class='form-label'>Title</label>
<input name='title' class='form-control mb-2' th:value='${ticket.title}'>
<label class='form-label'>Description</label>
<textarea name='description' class='form-control mb-2' th:text='${ticket.description}'></textarea>
<label class='form-label'>Status</label>
<select name='status' class='form-select mb-2'>
<option value='OPEN' th:selected="${ticket.status == 'OPEN'}">OPEN</option>
<option value='RESOLVED' th:selected="${ticket.status == 'RESOLVED'}">RESOLVED</option>
</select>
<label class='form-label'>Assigned To</label>
<select name='assignedTo' class='form-select mb-3'>
<option value='' th:selected='${ticket.assignedTo == null}'>Unassigned</option>
<option th:each='u:${assignableUsers}' th:value='${u}' th:text='${u}' th:selected='${u == ticket.assignedTo}'></option>
</select>
<p class='text-muted'>Created by <strong th:text='${ticket.createdBy}'></strong></p>
<button class='btn btn-success'>Save Changes</button>
<a href='/' class='btn btn-secondary'>Cancel</a>
</form>
</main></body></html>
