<!DOCTYPE html><html><head>
<link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' rel='stylesheet'>
</head><body>
<header class='bg-primary text-white py-3 mb-4'>
<div class='container text-center'><h1 class='h3 mb-0'>Help Desk Management System</h1></div>
</header>
<main class='container'>
<a href='/' class='btn btn-secondary mb-3'>Back to Dashboard</a>
<h2 th:text='${ticket.title}'>Ticket</h2>
<dl class='row'>
<dt class='col-sm-2'>ID</dt><dd class='col-sm-10' th:text='${ticket.id}'></dd>
<dt class='col-sm-2'>Description</dt><dd class='col-sm-10' th:text='${ticket.description}'></dd>
<dt class='col-sm-2'>Created By</dt><dd class='col-sm-10' th:text='${ticket.createdBy}'></dd>
<dt class='col-sm-2'>Assigned To</dt><dd class='col-sm-10' th:text="${ticket.assignedTo == null ? 'Unassigned' : ticket.assignedTo}"></dd>
<dt class='col-sm-2'>Status</dt><dd class='col-sm-10' th:text='${ticket.status}'></dd>
<dt class='col-sm-2'>Attachment</dt>
<dd class='col-sm-10'><a th:if='${ticket.attachmentName != null}' th:href='@{/tickets/{id}/attachment(id=${ticket.id})}' th:text='${ticket.attachmentName}'></a><span th:if='${ticket.attachmentName == null}'>None</span></dd>
</dl>
<a th:if='${isAdmin}' th:href='@{/tickets/{id}/edit(id=${ticket.id})}' class='btn btn-primary mb-4'>Edit Ticket</a>

<h3 class='h4'>Comments</h3>
<div th:if='${#lists.isEmpty(comments)}' class='text-muted mb-3'>No comments yet.</div>
<div th:each='comment:${comments}' class='border rounded p-3 mb-2'>
<div class='d-flex justify-content-between'>
<strong th:text='${comment.author}'></strong>
<small class='text-muted' th:text='${comment.createdAt}'>Time</small>
</div>
<p class='mb-0 mt-2' th:text='${comment.message}'></p>
</div>

<form th:action='@{/tickets/{id}/comments(id=${ticket.id})}' method='post' class='mt-3'>
<input type='hidden' th:name='${_csrf.parameterName}' th:value='${_csrf.token}'>
<label class='form-label'>Add Comment</label>
<textarea name='message' class='form-control mb-2' rows='3' maxlength='2000' required></textarea>
<button class='btn btn-success'>Post Comment</button>
</form>
</main></body></html>
