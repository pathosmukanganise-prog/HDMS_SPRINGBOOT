<!DOCTYPE html><html><head>
<link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' rel='stylesheet'>
</head><body>
<header class='bg-primary text-white py-3 mb-4'>
<div class='container text-center'><h1 class='h3 mb-0'>Help Desk Management System</h1></div>
</header>
<main class='container'>
<h2>Manage Users</h2>
<a href='/' class='btn btn-secondary mb-3'>Back to Dashboard</a>
<form th:action='@{/admin/users}' method='get' class='row g-2 mb-4'>
<div class='col-md-6'>
<input name='q' class='form-control' placeholder='Search username' th:value='${q}'>
</div>
<div class='col-md-3'>
<select name='role' class='form-select'>
<option value='' th:selected="${selectedRole == ''}">All Roles</option>
<option value='USER' th:selected="${selectedRole == 'USER'}">User</option>
<option value='ADMIN' th:selected="${selectedRole == 'ADMIN'}">Admin</option>
</select>
</div>
<div class='col-md-3'>
<button class='btn btn-primary'>Search</button>
<a href='/admin/users' class='btn btn-outline-secondary'>Clear</a>
</div>
</form>
<form th:action='@{/admin/users}' method='post' class='mb-4'>
<input type='hidden' th:name='${_csrf.parameterName}' th:value='${_csrf.token}'>
<input name='username' class='form-control mb-2' placeholder='Username' required>
<input name='password' type='password' class='form-control mb-2' placeholder='Password' required>
<select name='role' class='form-select mb-2'>
<option value='USER'>User</option>
<option value='ADMIN'>Admin</option>
</select>
<button class='btn btn-primary'>Create User</button>
</form>
<table class='table'>
<tr><th>Username</th><th>Role</th></tr>
<tr th:each='u:${users}'><td th:text='${u.username}'></td><td th:text='${u.role}'></td></tr>
</table>
</main></body></html>
