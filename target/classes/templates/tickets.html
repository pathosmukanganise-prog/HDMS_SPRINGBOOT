<!DOCTYPE html><html><head>
<link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' rel='stylesheet'>
<style>
.ticket-card{height:100%}
.ticket-meta{font-size:.9rem;color:#6c757d}
.ticket-title{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ticket-actions form{display:block}
</style>
</head><body>
<header class='bg-primary text-white py-3 mb-4'>
<div class='container text-center'><h1 class='h3 mb-0'>Help Desk Management System</h1></div>
</header>
<main class='container'>
<h2>Dashboard</h2>
<a href='/new' class='btn btn-primary'>Create Ticket</a>
<a href='/track' class='btn btn-info'>Track My Tickets</a>
<a th:if='${isAdmin}' href='/admin/users' class='btn btn-secondary'>Manage Users</a>
<a th:if='${isAdmin}' href='/admin/reports' class='btn btn-success'>Reports</a>
<form th:action='@{/logout}' method='post' class='float-end'>
<input type='hidden' th:name='${_csrf.parameterName}' th:value='${_csrf.token}'>
<button class='btn btn-danger'>Logout</button>
</form>
<p class='mt-3 mb-0'>Logged in as <strong th:text='${username}'></strong></p>
<div class='row mt-3'>
<div class='col-md-4 mb-2'>
<div class='border rounded p-3'>
<div class='text-muted'>My Tickets</div>
<div class='fs-4 fw-bold' th:text='${myTicketMetrics.total}'>0</div>
</div>
</div>
<div class='col-md-4 mb-2'>
<div class='border rounded p-3'>
<div class='text-muted'>Open</div>
<div class='fs-4 fw-bold' th:text='${myTicketMetrics.open}'>0</div>
</div>
</div>
<div class='col-md-4 mb-2'>
<div class='border rounded p-3'>
<div class='text-muted'>Resolved</div>
<div class='fs-4 fw-bold' th:text='${myTicketMetrics.resolved}'>0</div>
</div>
</div>
</div>
<form th:action='@{/}' method='get' class='row g-2 mt-3 mb-3'>
<div class='col-md-8'>
<input name='q' class='form-control' placeholder='Search tickets' th:value='${q}'>
</div>
<div class='col-md-4'>
<button class='btn btn-primary'>Search</button>
<a href='/' class='btn btn-outline-secondary'>Clear</a>
</div>
</form>
<div class='row row-cols-1 row-cols-md-2 row-cols-xl-3 g-3 mt-1' th:if='${!#lists.isEmpty(tickets)}'>
<div class='col' th:each='t:${tickets}'>
<div class='card shadow-sm ticket-card'>
<div class='card-body d-flex flex-column'>
<div class='d-flex justify-content-between align-items-start gap-2 mb-2'>
<div>
<div class='ticket-meta'>Ticket #<span th:text='${t.id}'></span></div>
<h3 class='h5 mb-0 ticket-title'>
<a th:if="${isAdmin or t.createdBy == username or t.assignedTo == username}" th:href='@{/tickets/{id}(id=${t.id})}' th:text='${t.title}'></a>
<span th:if="${!(isAdmin or t.createdBy == username or t.assignedTo == username)}" th:text='${t.title}'></span>
</h3>
</div>
<span class='badge text-bg-primary' th:text='${t.status}'></span>
</div>
<div class='ticket-meta mb-1'>Created by <span class='text-dark' th:text='${t.createdBy}'></span></div>
<div class='ticket-meta mb-3'>Assigned to <span class='text-dark' th:text="${t.assignedTo == null ? 'Unassigned' : t.assignedTo}"></span></div>
<div class='small mb-3'>
<span class='text-muted'>Attachment:</span>
<a th:if='${t.attachmentName != null}' th:href='@{/tickets/{id}/attachment(id=${t.id})}' th:text='${t.attachmentName}'></a>
<span th:if='${t.attachmentName == null}'>None</span>
</div>
<div class='ticket-actions mt-auto'>
<a th:if="${isAdmin or t.createdBy == username or t.assignedTo == username}" th:href='@{/tickets/{id}(id=${t.id})}' class='btn btn-sm btn-info me-1 mb-2'>Comments</a>
<a th:if='${isAdmin}' th:href='@{/tickets/{id}/edit(id=${t.id})}' class='btn btn-sm btn-primary mb-2'>Edit</a>
<form th:if='${isAdmin}' th:action='@{/tickets/{id}/assign(id=${t.id})}' method='post' class='mb-2'>
<input type='hidden' th:name='${_csrf.parameterName}' th:value='${_csrf.token}'>
<select name='assignedTo' class='form-select form-select-sm mb-1'>
<option th:each='u:${assignableUsers}' th:value='${u}' th:text='${u}' th:selected='${u == t.assignedTo}'></option>
</select>
<button class='btn btn-sm btn-secondary'>Assign</button>
</form>
<form th:if="${t.status != 'RESOLVED' and (t.createdBy == username or isAdmin)}" th:action='@{/tickets/{id}/resolve(id=${t.id})}' method='post' class='mb-2'>
<input type='hidden' th:name='${_csrf.parameterName}' th:value='${_csrf.token}'>
<button class='btn btn-sm btn-success'>Resolve</button>
</form>
<form th:if="${t.createdBy == username or isAdmin}" th:action='@{/tickets/{id}/delete(id=${t.id})}' method='post'>
<input type='hidden' th:name='${_csrf.parameterName}' th:value='${_csrf.token}'>
<button class='btn btn-sm btn-danger'>Delete</button>
</form>
</div>
</div>
</div>
</div>
</div>
<p th:if='${#lists.isEmpty(tickets)}' class='text-muted'>No tickets found.</p>
</main></body></html>
