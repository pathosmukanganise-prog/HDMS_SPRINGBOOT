<!DOCTYPE html><html><head>
<link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' rel='stylesheet'>
</head><body>
<header class='bg-primary text-white py-3 mb-4'>
<div class='container text-center'><h1 class='h3 mb-0'>Help Desk Management System</h1></div>
</header>
<main class='container'>
<h2>Create Ticket</h2>
<form th:action='@{/save}' method='post' enctype='multipart/form-data'>
<input type='hidden' th:name='${_csrf.parameterName}' th:value='${_csrf.token}'>
<input name='title' class='form-control mb-2' placeholder='Title'>
<textarea name='description' class='form-control mb-2'></textarea>
<input name='attachment' type='file' class='form-control mb-2'>
<button class='btn btn-success'>Submit</button>
</form></main></body></html>
